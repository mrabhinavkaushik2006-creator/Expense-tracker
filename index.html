<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: darkcyan;">
    <div class="container">
        <h1 style="font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">Expense Tracker</h1>
          <div class="Balance-box">
            <h2 style="font-family: Arial, Helvetica, sans-serif;" >Total Balance</h2>
            <h3 id="total-balance">₹0</h3>
          </div>
          <div class="Form-box">
            <input id="expense-name" type="text" placeholder="Enter the expense name">
            <input id="expense-no" type="number" placeholder="Enter the amaount">
            <select id="category">
                <option value="Food">Food</option>
                <option value="travel" > travel</option>
                <option value="Shopping" >Shopping</option>
            </select>
            <button id="add-btn">Add Expense</button>
          </div>
          <div class="Expense-list">
            <h2>Expense</h2>
            <ul id="expense-list">
                
            </ul>
          </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
